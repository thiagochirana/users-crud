services:
  postgres:
    image: postgres:17-alpine
    container_name: users-postgres
    environment:
      POSTGRES_DB: users_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d users_api"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    container_name: users-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/users_api
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    command: ./gradlew bootRun --no-daemon
    ports:
      - "8080:8080"
    volumes:
      - ./api:/app
      - gradle_cache:/root/.gradle
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: users-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  gradle_cache:
  frontend_node_modules:
